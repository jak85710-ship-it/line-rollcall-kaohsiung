services:
  - type: web
    name: line-rollcall-kaohsiung
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BASE_URL
        sync: false
      - key: ADMIN_TOKEN
        value: "12345"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        value: ben83127@gmail.com
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: "運動隊點名系統 <ben83127@gmail.com>"
      - key: EMAIL_TO
        value: ben83127@gmail.com
      - key: LINE_CHANNEL_ID
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LIFF_ID
        sync: false
      - key: COACH_LINE_USER_IDS
        sync: false
      - key: GOOGLE_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
