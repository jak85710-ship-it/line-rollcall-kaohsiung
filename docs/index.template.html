<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>中山國小桌球隊 · 點名</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .player-btn {
      min-height: 56px;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, background 0.15s, border-color 0.15s;
    }
    .player-btn:active { transform: scale(0.98); }
    .st-pending { background: #f1f5f9; border-color: #cbd5e1; color: #475569; }
    .st-present { background: #dcfce7; border-color: #22c55e; color: #166534; }
    .st-absent  { background: #fee2e2; border-color: #ef4444; color: #991b1b; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">

  <!-- 密碼鎖 -->
  <div id="lock-screen" class="fixed inset-0 bg-slate-900/60 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
      <h2 class="text-xl font-bold text-slate-800 mb-1">中山國小桌球隊</h2>
      <p class="text-sm text-slate-500 mb-4">請輸入密碼以開啟點名表</p>
      <input id="pwd-input" type="password" inputmode="numeric"
        class="w-full border-2 border-slate-200 rounded-xl px-4 py-3 text-lg text-center tracking-widest mb-3"
        placeholder="密碼" autocomplete="off">
      <p id="pwd-error" class="text-red-600 text-sm mb-2 hidden">密碼錯誤</p>
      <button id="pwd-btn" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold text-lg">進入</button>
    </div>
  </div>

  <!-- 主畫面 -->
  <div id="app" class="hidden max-w-lg mx-auto pb-32">
    <header class="bg-emerald-600 text-white px-5 pt-6 pb-5 rounded-b-3xl shadow-lg sticky top-0 z-10">
      <p class="text-emerald-100 text-sm">中山國小桌球隊 · 點名表</p>
      <h1 id="today-label" class="text-2xl font-bold mt-1"></h1>
      <div class="flex gap-2 mt-3 text-center text-sm">
        <div class="flex-1 bg-white/15 rounded-xl py-2">
          <div id="cnt-present" class="text-xl font-bold">0</div>
          <div class="text-emerald-100 text-xs">出席</div>
        </div>
        <div class="flex-1 bg-white/15 rounded-xl py-2">
          <div id="cnt-absent" class="text-xl font-bold">0</div>
          <div class="text-emerald-100 text-xs">缺席</div>
        </div>
        <div class="flex-1 bg-white/15 rounded-xl py-2">
          <div id="cnt-pending" class="text-xl font-bold">0</div>
          <div class="text-emerald-100 text-xs">未到</div>
        </div>
      </div>
    </header>

    <div class="px-4 pt-4">
      <p class="text-sm text-slate-500 mb-3">
        點名字切換：<span class="text-slate-600">灰=未到</span> →
        <span class="text-green-700">綠=出席</span> →
        <span class="text-red-700">紅=缺席</span>
      </p>
      <div id="player-list" class="space-y-2"></div>
    </div>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 p-4 shadow-[0_-4px_20px_rgba(0,0,0,0.08)]">
      <div class="max-w-lg mx-auto">
        <button id="submit-btn"
          class="w-full bg-emerald-600 hover:bg-emerald-700 text-white text-lg font-bold py-4 rounded-2xl shadow-lg disabled:opacity-50">
          確認送出
        </button>
      </div>
    </footer>
  </div>

  <!-- 成功 -->
  <div id="success-modal" class="hidden fixed inset-0 bg-black/40 flex items-center justify-center p-4 z-50">
    <div class="bg-white rounded-2xl p-6 max-w-sm w-full text-center">
      <div class="text-5xl mb-3">✅</div>
      <h3 class="text-xl font-bold text-slate-800 mb-2">已送達</h3>
      <p id="success-msg" class="text-slate-600 text-sm mb-4"></p>
      <button id="close-success" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold">完成</button>
    </div>
  </div>

  <script>
    // ========== 設定（GAS 部署後改 GAS_URL）==========
    const CONFIG = {
      PASSWORD: '2026',
      API_SECRET: 'zhongshan2026',
      GAS_URL: '在這裡貼 Google Apps Script 部署網址',
    };

    // 隊員名單（內建，不需伺服器）
    const ROSTER = __PLAYERS_JSON__;

    const $ = (id) => document.getElementById(id);
    let players = [];
    let submitting = false;

    function todayStr() {
      return new Intl.DateTimeFormat('en-CA', { timeZone: 'Asia/Taipei' }).format(new Date());
    }

    function displayDate() {
      return new Intl.DateTimeFormat('zh-TW', {
        timeZone: 'Asia/Taipei', year: 'numeric', month: 'long', day: 'numeric', weekday: 'long',
      }).format(new Date());
    }

    function nowStr() {
      return new Intl.DateTimeFormat('zh-TW', {
        timeZone: 'Asia/Taipei', year: 'numeric', month: '2-digit', day: '2-digit',
        hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false,
      }).format(new Date());
    }

    function esc(s) {
      return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function statusLabel(st) {
      if (st === 'present') return '出席';
      if (st === 'absent') return '缺席';
      return '未到';
    }

    function cycleStatus(st) {
      if (st === 'pending') return 'present';
      if (st === 'present') return 'absent';
      return 'pending';
    }

    function updateCounts() {
      let p = 0, a = 0, d = 0;
      for (const x of players) {
        if (x.status === 'present') p++;
        else if (x.status === 'absent') a++;
        else d++;
      }
      $('cnt-present').textContent = p;
      $('cnt-absent').textContent = a;
      $('cnt-pending').textContent = d;
    }

    function renderList() {
      const list = $('player-list');
      list.innerHTML = '';
      for (const p of players) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `player-btn w-full border-2 rounded-xl px-4 py-3 flex items-center justify-between st-${p.status}`;
        btn.innerHTML = `
          <span class="font-semibold text-left">${esc(p.name)}${p.grade ? `<span class="text-sm font-normal opacity-70 ml-1">${esc(p.grade)}</span>` : ''}</span>
          <span class="text-sm font-bold shrink-0 ml-2">${statusLabel(p.status)}</span>`;
        btn.onclick = () => {
          p.status = cycleStatus(p.status);
          renderList();
        };
        list.appendChild(btn);
      }
      updateCounts();
    }

    function unlock() {
      $('lock-screen').classList.add('hidden');
      $('app').classList.remove('hidden');
      $('today-label').textContent = displayDate();
      players = ROSTER.map((p) => ({ ...p, status: 'pending' }));
      renderList();
    }

    function tryUnlock() {
      if ($('pwd-input').value.trim() === CONFIG.PASSWORD) {
        sessionStorage.setItem('rollcall_ok', '1');
        unlock();
      } else {
        $('pwd-error').classList.remove('hidden');
      }
    }

    async function submitRollcall() {
      if (submitting) return;
      if (!CONFIG.GAS_URL || CONFIG.GAS_URL.includes('在這裡貼')) {
        alert('請先設定 Google Apps Script 部署網址（見設定教學.md）');
        return;
      }

      submitting = true;
      $('submit-btn').disabled = true;
      $('submit-btn').textContent = '送出中...';

      const payload = {
        secret: CONFIG.API_SECRET,
        date: todayStr(),
        submittedAt: nowStr(),
        records: players.map((p) => ({
          id: p.id,
          name: p.name,
          grade: p.grade || '',
          status: p.status,
          parent_phone: p.parent_phone || '',
          notes: p.notes || '',
        })),
      };

      try {
        const res = await fetch(CONFIG.GAS_URL, {
          method: 'POST',
          mode: 'cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload),
        });
        const result = await res.json();
        if (!result.ok) throw new Error(result.error || '送出失敗');

        const present = players.filter((p) => p.status === 'present').length;
        const absent = players.filter((p) => p.status === 'absent').length;
        $('success-msg').textContent = `出席 ${present} 人 · 缺席 ${absent} 人\n已寫入 Google 試算表並寄出 Email`;
        $('success-modal').classList.remove('hidden');
      } catch (err) {
        alert('送出失敗：' + err.message + '\n\n請確認 GAS 已部署且網址正確。');
      } finally {
        submitting = false;
        $('submit-btn').disabled = false;
        $('submit-btn').textContent = '確認送出';
      }
    }

    $('pwd-btn').onclick = tryUnlock;
    $('pwd-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') tryUnlock(); });
    $('submit-btn').onclick = submitRollcall;
    $('close-success').onclick = () => $('success-modal').classList.add('hidden');

    if (sessionStorage.getItem('rollcall_ok') === '1') unlock();
  </script>
</body>
</html>
